name: Loop Audit

on:
  pull_request:
  push:
    branches:
      - main

jobs:
  audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
      - name: Run unit tests
        run: python3 -m unittest discover -s tests
      - name: Run loop audit
        run: npx @cobusgreyling/loop-audit . --suggest
