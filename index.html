<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>OpenAI RSS 阅读器</title>
    <style>
      :root {
        color-scheme: light;
        --bg: #f6f7f4;
        --surface: #ffffff;
        --surface-muted: #eef1ea;
        --text: #1b1d1f;
        --muted: #626a70;
        --border: #d9ded6;
        --developers: #147d73;
        --developers-soft: #e4f3ef;
        --news: #9a5a00;
        --news-soft: #fff0d8;
        --dreyx: #315bb8;
        --dreyx-soft: #e8eefc;
        --hackernews: #b85b00;
        --hackernews-soft: #fff0e4;
        --hn-frontpage: #6b5a00;
        --hn-frontpage-soft: #f7f0d0;
        --hn-newest: #6a459b;
        --hn-newest-soft: #f0e8fb;
        --hn-bestcomments: #3f6f3d;
        --hn-bestcomments-soft: #e8f3e6;
        --error: #a33a2a;
        --error-soft: #fae8e4;
        --focus: #245fbd;
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-width: 320px;
        background: var(--bg);
        color: var(--text);
        font-family:
          Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI",
          sans-serif;
        line-height: 1.5;
      }

      a {
        color: inherit;
      }

      button,
      input {
        font: inherit;
      }

      .app {
        width: min(100% - 2rem, 1040px);
        margin: 0 auto;
        padding: 2rem 0 3rem;
      }

      .topbar,
      .view-header {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 1rem;
        margin-bottom: 1.5rem;
      }

      h1 {
        margin: 0;
        font-size: 2rem;
        line-height: 1.1;
        letter-spacing: 0;
      }

      h2 {
        margin: 0;
        font-size: 1.5rem;
        line-height: 1.2;
        letter-spacing: 0;
      }

      .subtitle {
        margin: 0.625rem 0 0;
        color: var(--muted);
        font-size: 0.975rem;
      }

      .actions {
        display: flex;
        flex-wrap: wrap;
        justify-content: flex-end;
        gap: 0.5rem;
      }

      .button,
      .link-button {
        display: inline-flex;
        min-height: 2.5rem;
        align-items: center;
        justify-content: center;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface);
        color: var(--text);
        padding: 0 0.875rem;
        cursor: pointer;
        text-decoration: none;
        white-space: nowrap;
      }

      .button:hover,
      .link-button:hover {
        border-color: #b9c1b7;
        background: #fbfcfa;
      }

      .button:focus-visible,
      .link-button:focus-visible,
      input:focus-visible,
      .title-button:focus-visible {
        outline: 3px solid rgba(36, 95, 189, 0.35);
        outline-offset: 2px;
      }

      .button:disabled {
        cursor: wait;
        opacity: 0.65;
      }

      .summary {
        display: flex;
        flex-wrap: wrap;
        align-items: center;
        gap: 0.75rem;
        margin-bottom: 1rem;
        color: var(--muted);
        font-size: 0.9375rem;
      }

      .legend,
      .item-actions,
      .meta-row {
        display: flex;
        flex-wrap: wrap;
        gap: 0.5rem;
      }

      .pill,
      .source,
      .category {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        white-space: nowrap;
      }

      .pill {
        gap: 0.375rem;
        border: 1px solid var(--border);
        background: var(--surface);
        padding: 0.25rem 0.625rem;
        color: var(--text);
        font-size: 0.875rem;
      }

      .dot {
        width: 0.625rem;
        height: 0.625rem;
        border-radius: 999px;
        background: currentColor;
      }

      .developers {
        color: var(--developers);
      }

      .news {
        color: var(--news);
      }

      .dreyx {
        color: var(--dreyx);
      }

      .hackernews {
        color: var(--hackernews);
      }

      .hn-frontpage {
        color: var(--hn-frontpage);
      }

      .hn-newest {
        color: var(--hn-newest);
      }

      .hn-bestcomments {
        color: var(--hn-bestcomments);
      }

      .status,
      .error-panel,
      .empty,
      .config-form,
      .reader {
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface);
        padding: 1rem;
      }

      .status {
        color: var(--muted);
      }

      .error-panel {
        display: none;
        margin-bottom: 1rem;
        border-color: #e5b7ad;
        background: var(--error-soft);
        color: var(--error);
      }

      .error-panel.visible {
        display: block;
      }

      .feed-list,
      .source-list {
        display: grid;
        gap: 0.75rem;
        margin: 0;
        padding: 0;
        list-style: none;
      }

      .item,
      .source-row {
        border: 1px solid var(--border);
        border-left-width: 0.375rem;
        border-radius: 8px;
        background: var(--surface);
        padding: 1rem;
      }

      .item[data-source="developers"] {
        border-left-color: var(--developers);
      }

      .item[data-source="news"] {
        border-left-color: var(--news);
      }

      .item[data-source="dreyx"] {
        border-left-color: var(--dreyx);
      }

      .item[data-source="hackernews"] {
        border-left-color: var(--hackernews);
      }

      .item[data-source="hn-frontpage"] {
        border-left-color: var(--hn-frontpage);
      }

      .item[data-source="hn-newest"] {
        border-left-color: var(--hn-newest);
      }

      .item[data-source="hn-bestcomments"] {
        border-left-color: var(--hn-bestcomments);
      }

      .item:not([data-source="developers"]):not([data-source="news"]):not([data-source="dreyx"]):not(
          [data-source="hackernews"]
        ):not([data-source="hn-frontpage"]):not([data-source="hn-newest"]):not([data-source="hn-bestcomments"]),
      .source-row {
        border-left-color: #5f6f52;
      }

      .item-header,
      .source-row {
        display: flex;
        align-items: flex-start;
        justify-content: space-between;
        gap: 0.75rem;
      }

      .source {
        gap: 0.375rem;
        padding: 0.25rem 0.625rem;
        font-size: 0.8125rem;
        font-weight: 650;
      }

      .source[data-source="developers"] {
        background: var(--developers-soft);
        color: var(--developers);
      }

      .source[data-source="news"] {
        background: var(--news-soft);
        color: var(--news);
      }

      .source[data-source="dreyx"] {
        background: var(--dreyx-soft);
        color: var(--dreyx);
      }

      .source[data-source="hackernews"] {
        background: var(--hackernews-soft);
        color: var(--hackernews);
      }

      .source[data-source="hn-frontpage"] {
        background: var(--hn-frontpage-soft);
        color: var(--hn-frontpage);
      }

      .source[data-source="hn-newest"] {
        background: var(--hn-newest-soft);
        color: var(--hn-newest);
      }

      .source[data-source="hn-bestcomments"] {
        background: var(--hn-bestcomments-soft);
        color: var(--hn-bestcomments);
      }

      .source:not([data-source="developers"]):not([data-source="news"]):not([data-source="dreyx"]):not(
          [data-source="hackernews"]
        ):not([data-source="hn-frontpage"]):not([data-source="hn-newest"]):not([data-source="hn-bestcomments"]) {
        background: var(--surface-muted);
        color: #4f6042;
      }

      .date {
        color: var(--muted);
        font-size: 0.875rem;
        text-align: right;
      }

      .item-title {
        margin: 0.625rem 0 0;
        font-size: 1.125rem;
        line-height: 1.35;
        letter-spacing: 0;
      }

      .title-button {
        display: inline;
        border: 0;
        background: transparent;
        color: var(--text);
        cursor: pointer;
        padding: 0;
        text-align: left;
        text-decoration: none;
      }

      .title-button:hover {
        text-decoration: underline;
        text-underline-offset: 0.2em;
      }

      .description,
      .reader-body,
      .source-url {
        color: var(--muted);
        overflow-wrap: anywhere;
      }

      .description {
        margin: 0.625rem 0 0;
      }

      .category {
        border: 1px solid var(--border);
        padding: 0.125rem 0.5rem;
        color: var(--muted);
        font-size: 0.8125rem;
      }

      .item-actions {
        margin-top: 0.875rem;
      }

      .empty {
        color: var(--muted);
        text-align: center;
      }

      .load-more {
        min-height: 2rem;
        margin-top: 0.75rem;
        color: var(--muted);
        font-size: 0.9375rem;
        text-align: center;
      }

      .config-form {
        display: grid;
        grid-template-columns: minmax(0, 1fr) minmax(8rem, 16rem) auto;
        gap: 0.75rem;
        margin-bottom: 1rem;
      }

      input {
        width: 100%;
        min-height: 2.5rem;
        border: 1px solid var(--border);
        border-radius: 8px;
        background: var(--surface);
        color: var(--text);
        padding: 0 0.75rem;
      }

      .source-main {
        min-width: 0;
      }

      .source-name {
        font-weight: 700;
      }

      .source-url {
        margin-top: 0.25rem;
        font-size: 0.875rem;
      }

      .reader {
        display: grid;
        gap: 1rem;
      }

      .reader-title {
        margin: 0;
        font-size: 1.75rem;
        line-height: 1.2;
        letter-spacing: 0;
      }

      .reader-body {
        white-space: pre-wrap;
      }

      @media (max-width: 720px) {
        .app {
          width: min(100% - 1rem, 1040px);
          padding-top: 1rem;
        }

        .topbar,
        .view-header,
        .item-header,
        .source-row {
          display: grid;
        }

        .actions,
        .item-actions {
          justify-content: flex-start;
        }

        .button,
        .link-button {
          width: 100%;
        }

        .date {
          text-align: left;
        }

        .config-form {
          grid-template-columns: 1fr;
        }
      }

      @media (min-width: 800px) {
        h1 {
          font-size: 2.5rem;
        }
      }
    </style>
  </head>
  <body>
    <main class="app">
      <section id="list-view">
        <header class="topbar">
          <div>
            <h1>OpenAI RSS 阅读器</h1>
            <p class="subtitle">历史条目按发布时间倒序混排</p>
          </div>
          <div class="actions">
            <button class="button" id="refresh" type="button">刷新</button>
            <button class="button" id="open-config" type="button">配置</button>
          </div>
        </header>

        <section class="summary" aria-label="RSS 状态">
          <div class="legend" id="legend" aria-label="订阅来源"></div>
          <span id="updated">尚未更新</span>
        </section>

        <div class="error-panel" id="errors" role="status"></div>
        <div class="status" id="status" role="status" aria-live="polite">正在加载 RSS...</div>
        <ul class="feed-list" id="feed-list" aria-label="RSS 文章列表"></ul>
        <div class="load-more" id="load-more" aria-live="polite"></div>
      </section>

      <section id="config-view" hidden>
        <header class="view-header">
          <div>
            <h1>信息源配置</h1>
            <p class="subtitle">管理 RSS 订阅源</p>
          </div>
          <button class="button" id="back-from-config" type="button">返回</button>
        </header>

        <form class="config-form" id="feed-form">
          <input id="feed-url" name="url" type="url" placeholder="RSS URL" required />
          <input id="feed-label" name="label" type="text" placeholder="名称" />
          <button class="button" type="submit">增加</button>
        </form>
        <div class="error-panel" id="config-errors" role="status"></div>
        <ul class="source-list" id="source-list" aria-label="RSS 信息源列表"></ul>
      </section>

      <section id="reader-view" hidden>
        <header class="view-header">
          <div>
            <h1>文章浏览</h1>
            <p class="subtitle">中文内容</p>
          </div>
          <button class="button" id="back-from-reader" type="button">返回</button>
        </header>
        <article class="reader" id="reader"></article>
      </section>
    </main>

    <script>
      const PAGE_LIMIT = 20;
      const listView = document.querySelector("#list-view");
      const configView = document.querySelector("#config-view");
      const readerView = document.querySelector("#reader-view");
      const list = document.querySelector("#feed-list");
      const sourceList = document.querySelector("#source-list");
      const status = document.querySelector("#status");
      const errors = document.querySelector("#errors");
      const configErrors = document.querySelector("#config-errors");
      const refresh = document.querySelector("#refresh");
      const openConfig = document.querySelector("#open-config");
      const updated = document.querySelector("#updated");
      const loadMore = document.querySelector("#load-more");
      const legend = document.querySelector("#legend");
      const feedForm = document.querySelector("#feed-form");
      const feedUrl = document.querySelector("#feed-url");
      const feedLabel = document.querySelector("#feed-label");
      const reader = document.querySelector("#reader");

      let nextOffset = 0;
      let hasMore = true;
      let isLoading = false;
      let listLoaded = false;
      let feedLabels = new Map();

      function setText(element, value) {
        element.textContent = value;
      }

      function showView(view) {
        listView.hidden = view !== "list";
        configView.hidden = view !== "config";
        readerView.hidden = view !== "reader";
        window.scrollTo({ top: 0 });
      }

      function navigate(hash) {
        if (window.location.hash === hash) {
          route();
          return;
        }
        window.location.hash = hash;
      }

      function itemHash(itemId) {
        return `#/items/${encodeURIComponent(itemId)}`;
      }

      function formatUpdatedAt(value) {
        if (!value) return "尚未更新";
        return `更新于 ${new Intl.DateTimeFormat("zh-CN", {
          dateStyle: "medium",
          timeStyle: "short",
        }).format(new Date(value))}`;
      }

      function clearChildren(element) {
        while (element.firstChild) {
          element.removeChild(element.firstChild);
        }
      }

      function renderErrors(target, feedErrors, prefix) {
        if (!feedErrors || feedErrors.length === 0) {
          target.classList.remove("visible");
          setText(target, "");
          return;
        }

        const message = feedErrors
          .map((error) => `${error.source || error.code || "reader"}: ${error.message}`)
          .join("；");
        setText(target, `${prefix}：${message}`);
        target.classList.add("visible");
      }

      function renderLegend(feeds) {
        clearChildren(legend);
        feedLabels = new Map(feeds.map((feed) => [feed.id, feed.label]));
        for (const feed of feeds) {
          const pill = document.createElement("span");
          pill.className = `pill ${feed.id}`;
          const dot = document.createElement("span");
          dot.className = "dot";
          dot.setAttribute("aria-hidden", "true");
          pill.appendChild(dot);
          pill.append(feed.label);
          legend.appendChild(pill);
        }
      }

      function renderItems(items, { append = false } = {}) {
        if (!append) {
          clearChildren(list);
        }

        if ((!items || items.length === 0) && !append) {
          const empty = document.createElement("li");
          empty.className = "empty";
          setText(empty, "暂无 RSS 条目");
          list.appendChild(empty);
          return;
        }

        const fragment = document.createDocumentFragment();
        for (const item of items) {
          const row = document.createElement("li");
          row.className = "item";
          row.dataset.source = item.source;

          const header = document.createElement("div");
          header.className = "item-header";

          const source = document.createElement("span");
          source.className = "source";
          source.dataset.source = item.source;
          setText(source, item.sourceLabel || feedLabels.get(item.source) || item.source);

          const date = document.createElement("time");
          date.className = "date";
          date.dateTime = item.publishedAt;
          setText(date, item.publishedDisplay);

          header.append(source, date);

          const title = document.createElement("h2");
          title.className = "item-title";
          const titleButton = document.createElement("button");
          titleButton.className = "title-button";
          titleButton.type = "button";
          titleButton.dataset.itemId = item.id;
          setText(titleButton, item.title);
          titleButton.addEventListener("click", () => navigate(itemHash(item.id)));
          title.appendChild(titleButton);

          const description = document.createElement("p");
          description.className = "description";
          setText(description, item.description || "无摘要");

          const meta = document.createElement("div");
          meta.className = "meta-row";
          if (item.classification) {
            const classification = document.createElement("span");
            classification.className = "category";
            setText(classification, item.classification);
            meta.appendChild(classification);
          }
          if (item.translationStatus && item.translationStatus !== "translated") {
            const translation = document.createElement("span");
            translation.className = "category";
            setText(translation, item.translationStatus);
            meta.appendChild(translation);
          }

          const itemActions = document.createElement("div");
          itemActions.className = "item-actions";
          const originalLink = document.createElement("a");
          originalLink.className = "link-button";
          originalLink.href = item.originalLink || item.link;
          originalLink.target = "_blank";
          originalLink.rel = "noopener noreferrer";
          setText(originalLink, "原文链接");
          itemActions.appendChild(originalLink);

          row.append(header, title, description);
          if (meta.childElementCount > 0) {
            row.appendChild(meta);
          }
          row.appendChild(itemActions);
          fragment.appendChild(row);
        }

        list.appendChild(fragment);
      }

      function updatePagination(pagination) {
        nextOffset = pagination?.nextOffset ?? nextOffset;
        hasMore = Boolean(pagination?.hasMore);
        if (hasMore) {
          setText(loadMore, "");
        } else if (pagination && pagination.total > 0) {
          setText(loadMore, "已加载全部历史条目");
        } else {
          setText(loadMore, "");
        }
      }

      async function loadRss({ reset = false } = {}) {
        if (isLoading) return;

        isLoading = true;
        const offset = reset ? 0 : nextOffset;
        refresh.disabled = true;
        setText(status, reset ? "正在加载 RSS..." : "正在加载更多...");
        status.hidden = !reset;
        setText(loadMore, reset ? "" : "正在加载更多...");

        try {
          const params = new URLSearchParams({
            limit: String(PAGE_LIMIT),
            offset: String(offset),
            refresh: "0",
          });
          const response = await fetch(`/rss?${params}`, { headers: { Accept: "application/json" } });
          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }

          const payload = await response.json();
          renderLegend(payload.feeds || []);
          renderErrors(errors, payload.errors, "部分订阅源加载失败");
          renderItems(payload.items, { append: !reset });
          updatePagination(payload.pagination);
          setText(updated, formatUpdatedAt(payload.updatedAt));
          status.hidden = true;
          listLoaded = true;
        } catch (error) {
          renderErrors(errors, [{ message: error.message }], "RSS 加载失败");
          if (reset) {
            clearChildren(list);
          }
          setText(status, reset ? "RSS 加载失败" : "加载更多失败");
          status.hidden = false;
        } finally {
          isLoading = false;
          refresh.disabled = false;
        }
      }

      async function syncNow() {
        if (isLoading) return;
        refresh.disabled = true;
        setText(status, "正在同步 RSS...");
        status.hidden = false;
        try {
          const response = await fetch("/api/sync", {
            method: "POST",
            headers: { Accept: "application/json" },
          });
          const payload = await response.json();
          if (!response.ok) {
            throw new Error(payload.error?.message || `HTTP ${response.status}`);
          }
          listLoaded = false;
          await loadRss({ reset: true });
        } catch (error) {
          renderErrors(errors, [{ message: error.message }], "RSS 同步失败");
          setText(status, "RSS 同步失败");
          status.hidden = false;
        } finally {
          refresh.disabled = false;
        }
      }

      async function loadFeeds() {
        try {
          const response = await fetch("/api/feeds", { headers: { Accept: "application/json" } });
          if (!response.ok) throw new Error(`HTTP ${response.status}`);
          const payload = await response.json();
          renderSourceList(payload.feeds || []);
          renderErrors(configErrors, [], "");
        } catch (error) {
          renderErrors(configErrors, [{ message: error.message }], "信息源加载失败");
        }
      }

      function renderSourceList(feeds) {
        clearChildren(sourceList);
        for (const feed of feeds) {
          const row = document.createElement("li");
          row.className = "source-row";

          const main = document.createElement("div");
          main.className = "source-main";
          const name = document.createElement("div");
          name.className = "source-name";
          setText(name, feed.label);
          const url = document.createElement("div");
          url.className = "source-url";
          setText(url, feed.url);
          main.append(name, url);

          const remove = document.createElement("button");
          remove.className = "button";
          remove.type = "button";
          setText(remove, "删除");
          remove.addEventListener("click", () => deleteFeed(feed.id));

          row.append(main, remove);
          sourceList.appendChild(row);
        }
      }

      async function addFeed(event) {
        event.preventDefault();
        try {
          const response = await fetch("/api/feeds", {
            method: "POST",
            headers: { "Content-Type": "application/json", Accept: "application/json" },
            body: JSON.stringify({ url: feedUrl.value, label: feedLabel.value }),
          });
          const payload = await response.json();
          if (!response.ok) {
            throw new Error(payload.error?.message || `HTTP ${response.status}`);
          }
          feedUrl.value = "";
          feedLabel.value = "";
          await loadFeeds();
          await loadRss({ reset: true });
        } catch (error) {
          renderErrors(configErrors, [{ message: error.message }], "信息源保存失败");
        }
      }

      async function deleteFeed(feedId) {
        try {
          const response = await fetch(`/api/feeds/${encodeURIComponent(feedId)}`, {
            method: "DELETE",
            headers: { Accept: "application/json" },
          });
          const payload = await response.json();
          if (!response.ok) {
            throw new Error(payload.error?.message || `HTTP ${response.status}`);
          }
          await loadFeeds();
          await loadRss({ reset: true });
        } catch (error) {
          renderErrors(configErrors, [{ message: error.message }], "信息源删除失败");
        }
      }

      async function showReader(itemId) {
        try {
          const response = await fetch(`/api/items/${encodeURIComponent(itemId)}`, {
            headers: { Accept: "application/json" },
          });
          const payload = await response.json();
          if (!response.ok) {
            throw new Error(payload.error?.message || `HTTP ${response.status}`);
          }
          renderReader(payload.item);
          showView("reader");
        } catch (error) {
          renderErrors(errors, [{ message: error.message }], "文章加载失败");
        }
      }

      function renderReader(item) {
        clearChildren(reader);

        const title = document.createElement("h2");
        title.className = "reader-title";
        setText(title, item.title);

        const meta = document.createElement("div");
        meta.className = "meta-row";
        const source = document.createElement("span");
        source.className = "source";
        source.dataset.source = item.source;
        setText(source, item.sourceLabel);
        const date = document.createElement("time");
        date.className = "date";
        date.dateTime = item.publishedAt;
        setText(date, item.publishedDisplay);
        meta.append(source, date);
        if (item.classification) {
          const classification = document.createElement("span");
          classification.className = "category";
          setText(classification, item.classification);
          meta.appendChild(classification);
        }

        const summary = document.createElement("p");
        summary.className = "description";
        setText(summary, item.summaryZh || item.description || "");

        const body = document.createElement("div");
        body.className = "reader-body";
        setText(body, item.contentZh || item.summaryZh || item.description || "");

        const originalLink = document.createElement("a");
        originalLink.className = "link-button";
        originalLink.href = item.originalLink || item.link;
        originalLink.target = "_blank";
        originalLink.rel = "noopener noreferrer";
        setText(originalLink, "原文链接");

        reader.append(title, meta, summary, body, originalLink);
      }

      function setupInfiniteScroll() {
        if (!("IntersectionObserver" in window)) {
          window.addEventListener("scroll", () => {
            const nearBottom = window.innerHeight + window.scrollY >= document.body.offsetHeight - 400;
            if (!listView.hidden && nearBottom && hasMore) {
              loadRss();
            }
          });
          return;
        }

        const observer = new IntersectionObserver(
          (entries) => {
            if (!listView.hidden && entries.some((entry) => entry.isIntersecting) && hasMore) {
              loadRss();
            }
          },
          { rootMargin: "400px 0px" },
        );
        observer.observe(loadMore);
      }

      refresh.addEventListener("click", syncNow);
      openConfig.addEventListener("click", async () => {
        navigate("#/config");
      });
      document.querySelector("#back-from-config").addEventListener("click", () => navigate("#/"));
      document.querySelector("#back-from-reader").addEventListener("click", () => navigate("#/"));
      feedForm.addEventListener("submit", addFeed);

      async function route() {
        const hash = window.location.hash || "#/";
        if (hash === "#/config") {
          showView("config");
          await loadFeeds();
          return;
        }

        if (hash.startsWith("#/items/")) {
          const itemId = decodeURIComponent(hash.slice("#/items/".length));
          await showReader(itemId);
          return;
        }

        showView("list");
        if (!listLoaded) {
          await loadRss({ reset: true });
        }
      }

      setupInfiniteScroll();
      window.addEventListener("hashchange", route);
      route();
    </script>
  </body>
</html>
